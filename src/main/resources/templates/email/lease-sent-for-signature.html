<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contrato listo para firmar</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:30px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background:#1a3c5e;padding:28px 40px;text-align:center;">
                        <span style="color:#ffffff;font-size:26px;font-weight:bold;letter-spacing:1px;">OpenRoof</span>
                    </td>
                </tr>
                <tr>
                    <td style="padding:36px 40px;">
                        <h2 style="margin:0 0 16px;color:#1a3c5e;font-size:20px;">Contrato listo para firmar</h2>
                        <p style="margin:0 0 16px;color:#444;font-size:15px;">
                            Hola, <strong th:text="${recipientName}">Usuario</strong>.
                        </p>
                        <div style="color:#444;font-size:15px;line-height:1.6;">
                            <p>El contrato de alquiler para
                                <strong th:text="${propertyTitle}">Propiedad</strong>
                                está disponible para tu firma.</p>
                            <p th:if="${expiresAt != null}">
                                <strong>Vencimiento del link:</strong>
                                <span th:text="${expiresAt}">31/12/2026</span>
                            </p>
                        </div>
                        <div style="text-align:center;margin-top:32px;">
                            <a th:href="${signatureLink}"
                               style="background:#1a3c5e;color:#ffffff;text-decoration:none;padding:12px 32px;border-radius:6px;font-size:15px;font-weight:bold;display:inline-block;">
                                Firmar contrato
                            </a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="background:#f9f9f9;padding:20px 40px;text-align:center;border-top:1px solid #eeeeee;">
                        <p style="margin:0;color:#999;font-size:12px;">
                            Este correo fue generado automáticamente por OpenRoof.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
