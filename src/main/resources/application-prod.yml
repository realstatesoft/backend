# ============================================================
# application-prod.yml — Perfil PRODUCCIÓN
# Activar con: SPRING_PROFILES_ACTIVE=prod
# Todos los valores sensibles vienen de variables de entorno.
# ============================================================

# Render inyecta PORT; Spring Boot la lee aquí como server.port
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Liquibase igual habilitado — migraciones automáticas al arrancar
  liquibase:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

# ── JWT ──
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000        # 24 horas
      refresh-expiration: 604800000 # 7 días

# ── Supabase ──
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images}

# ── Upload ──
upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}

# ── CORS — orígenes permitidos (URL del frontend en Vercel) ──
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:5173}

# ── Logging reducido en producción ──
logging:
  level:
    root: WARN
    com.openroof: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# ── Swagger deshabilitado en producción (opcional, comentar para dejarlo activo) ──
# springdoc:
#   swagger-ui:
#     enabled: false
#   api-docs:
#     enabled: false
