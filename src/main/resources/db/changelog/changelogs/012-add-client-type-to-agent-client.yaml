databaseChangeLog:
  - changeSet:
      id: 012-add-client-type-to-agent-client
      author: Otto
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: agent_clients
                columnName: client_type
      changes:
        - addColumn:
            tableName: agent_clients
            columns:
              - column:
                  name: client_type
                  type: varchar(20)
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: client_type
                  type: varchar(20)
      rollback:
        - dropColumn:
            tableName: agent_clients
            columnName: client_type
        - dropColumn:
            tableName: users
            columnName: client_type
