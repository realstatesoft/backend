databaseChangeLog:
  - changeSet:
      id: seed-test-client-user-maria
      author: Otto
      context: dev,test
      validCheckSum: ANY
      preConditions:
        - onFail: MARK_RAN
          and:
            - not:
                sqlCheck:
                  expectedResult: 1
                  sql: "SELECT COUNT(*) FROM users WHERE email = 'maria.garcia@test.com'"
            - not:
                sqlCheck:
                  expectedResult: 1
                  sql: "SELECT COUNT(*) FROM users WHERE id = 202"
      changes:
        - insert:
            tableName: users
            columns:
              - column: {name: id, valueNumeric: 202}
              - column: {name: email, value: maria.garcia@test.com}
              - column: {name: password_hash, value: "$2a$10$w3oa2wou4oTUPuafWGrR.ezomBs0tjgLZYL4Nd6ccvQ5mIiMDCYsS"}
              - column: {name: name, value: Maria Garcia}
              - column: {name: role, value: USER}
              - column: {name: created_at, valueComputed: "now()"}
              - column: {name: updated_at, valueComputed: "now()"}
              - column: {name: version, valueNumeric: 1}

