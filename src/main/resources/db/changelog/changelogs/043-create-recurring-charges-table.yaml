databaseChangeLog:
  # OR-211: [BE] Migracion DB: crear tabla RecurringCharge
  - changeSet:
      id: 043-create-recurring-charges-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: recurring_charges
      changes:
        - createTable:
            tableName: recurring_charges
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: lease_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: frequency
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
        - addForeignKeyConstraint:
            baseTableName: recurring_charges
            baseColumnNames: lease_id
            referencedTableName: leases
            referencedColumnNames: id
            constraintName: fk_recurring_charges_lease
        - createIndex:
            indexName: idx_recurring_charges_lease_active
            tableName: recurring_charges
            columns:
              - column:
                  name: lease_id
              - column:
                  name: is_active
