databaseChangeLog:
  - changeSet:
      id: 019-create-user-documents-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: user_documents
      changes:
        - createTable:
            tableName: user_documents
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_documents_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: document_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: document_status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
              - column:
                  name: filename
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
              - column:
                  name: size
                  type: BIGINT
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
        - createIndex:
            indexName: idx_user_documents_user
            tableName: user_documents
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_user_documents_status
            tableName: user_documents
            columns:
              - column:
                  name: document_status
