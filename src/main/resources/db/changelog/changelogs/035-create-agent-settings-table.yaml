databaseChangeLog:
  - changeSet:
      id: 035-create-agent-settings-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: agent_settings
      changes:
        - createTable:
            tableName: agent_settings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_agent_settings_user
                    references: users(id)
              - column:
                  name: auto_assign_leads
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: notify_new_lead
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: notify_visit_request
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: notify_new_offer
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: work_radius_km
                  type: INTEGER
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
      rollback:
        - dropTable:
            tableName: agent_settings

  - changeSet:
      id: 035-add-work-radius-non-negative-check
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: agent_settings
      changes:
        - sql:
            sql: "UPDATE agent_settings SET work_radius_km = 0 WHERE work_radius_km IS NOT NULL AND work_radius_km < 0"
        - sql:
            sql: "ALTER TABLE agent_settings ADD CONSTRAINT ck_agent_settings_work_radius_km_non_negative CHECK (work_radius_km >= 0)"
      rollback:
        - sql:
            sql: "ALTER TABLE agent_settings DROP CONSTRAINT ck_agent_settings_work_radius_km_non_negative"
