databaseChangeLog:
  - changeSet:
      id: 058-agent-reviews-unique-constraint
      author: OR-314
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: >
              SELECT COUNT(*) FROM (
                SELECT agent_id, user_id FROM agent_reviews
                WHERE deleted_at IS NULL
                GROUP BY agent_id, user_id
                HAVING COUNT(*) > 1
              ) duplicates
      changes:
        - sql:
            sql: >
              CREATE UNIQUE INDEX uq_agent_reviews_active_agent_user
              ON agent_reviews (agent_id, user_id)
              WHERE deleted_at IS NULL;
      rollback:
        - sql:
            sql: DROP INDEX IF EXISTS uq_agent_reviews_active_agent_user;
