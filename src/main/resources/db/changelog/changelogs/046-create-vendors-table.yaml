databaseChangeLog:
  # OR-243: [BE] Migracion DB: tabla Vendor
  - changeSet:
      id: 046-create-vendors-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: vendors
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: company_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: contact_name
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(30)
              - column:
                  name: tax_id
                  type: VARCHAR(50)
              - column:
                  name: specialties
                  type: JSONB
              - column:
                  name: rating
                  type: NUMERIC(3, 2)
              - column:
                  name: total_jobs
                  type: INTEGER
                  defaultValueNumeric: 0
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: insurance_expires_at
                  type: DATE
              - column:
                  name: hourly_rate
                  type: NUMERIC(10, 2)
              - column:
                  name: service_areas
                  type: JSONB
        - createIndex:
            indexName: idx_vendors_is_active
            tableName: vendors
            columns:
              - column:
                  name: is_active
        - sql:
            sql: "CREATE INDEX idx_vendors_specialties_gin ON vendors USING GIN (specialties);"
            splitStatements: false
