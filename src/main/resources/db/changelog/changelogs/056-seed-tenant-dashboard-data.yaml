databaseChangeLog:
  - changeSet:
      id: seed-tenant-dashboard-data-056
      author: openroof
      context: dev,test
      changes:
        # 1. Asegurar Landlord (ID 300) y Tenant (ID 32)
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO users (id, email, password_hash, name, role, created_at, updated_at, version, onboarding_completed)
              SELECT 300, 'landlord.test@openroof.com', '$2a$10$mC7ms9E7U8z.og.0uA6jbeuO0u5XvGzXj.Esh8N8VfK.S9U6G5Fqy', 'Juan Landlord', 'USER', NOW(), NOW(), 1, TRUE
              WHERE NOT EXISTS (SELECT 1 FROM users WHERE id = 300);
              
              INSERT INTO users (id, email, password_hash, name, role, created_at, updated_at, version, onboarding_completed)
              SELECT 32, 'tenant.dashboard@openroof.com', '$2a$10$mC7ms9E7U8z.og.0uA6jbeuO0u5XvGzXj.Esh8N8VfK.S9U6G5Fqy', 'Test Tenant Dashboard', 'USER', NOW(), NOW(), 1, TRUE
              WHERE NOT EXISTS (SELECT 1 FROM users WHERE id = 32);

        # 2. Crear una Propiedad (si no existe)
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO properties (id, title, address, price, rent_amount, rent_currency, status, property_type, listing_type, owner_id, visibility, created_at, updated_at, version)
              SELECT 400, 'Departamento de Lujo en Villa Morra', 'Avda. Santa Teresa 1234', 1200, 1200, 'USD', 'RENTED', 'APARTMENT', 'RENT', 300, 'PUBLIC', NOW(), NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM properties WHERE id = 400);

        # 3. Forzar asignación del Lease (ID 500) al Usuario 32 con enum correcto
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO leases (id, property_id, landlord_id, primary_tenant_id, status, start_date, end_date, lease_type, monthly_rent, currency, billing_frequency, due_day, created_at, updated_at, version)
              SELECT 500, 400, 300, 32, 'ACTIVE', '2026-01-01', '2026-12-31', 'FIXED_TERM', 1200, 'USD', 'MONTHLY', 5, NOW(), NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM leases WHERE id = 500);

        # 4. Asegurar cuotas de alquiler (Installments)
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO rental_installments (id, lease_id, installment_number, period_start, period_end, due_date, base_rent, total_amount, paid_amount, status, created_at, updated_at, version)
              SELECT 601, 500, 1, '2026-01-01', '2026-01-31', '2026-01-05', 1200, 1200, 1200, 'PAID', NOW(), NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM rental_installments WHERE id = 601);
              
              INSERT INTO rental_installments (id, lease_id, installment_number, period_start, period_end, due_date, base_rent, total_amount, paid_amount, status, created_at, updated_at, version)
              SELECT 602, 500, 2, '2026-05-01', '2026-05-31', '2026-05-20', 1200, 1200, 0, 'PENDING', NOW(), NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM rental_installments WHERE id = 602);

        # 5. Asegurar pagos para el Usuario 32
        - sql:
            dbms: postgresql
            sql: |
              INSERT INTO payments (id, user_id, amount, type, concept, status, transaction_code, created_at, updated_at, version)
              SELECT 701, 32, 1200, 'CONTRACT', 'Alquiler Enero 2026', 'COMPLETED', 'TXN-123456', NOW(), NOW(), 1
              WHERE NOT EXISTS (SELECT 1 FROM payments WHERE id = 701);

        # 6. Actualizar secuencias para evitar colisiones
        - sql:
            dbms: postgresql
            sql: |
              SELECT setval('users_id_seq', (SELECT MAX(id) FROM users));
              SELECT setval('properties_id_seq', (SELECT MAX(id) FROM properties));
              SELECT setval('leases_id_seq', (SELECT MAX(id) FROM leases));
              SELECT setval('rental_installments_id_seq', (SELECT MAX(id) FROM rental_installments));
              SELECT setval('payments_id_seq', (SELECT MAX(id) FROM payments));
