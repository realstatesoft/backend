databaseChangeLog:
  - changeSet:
      id: 031-create-shedlock
      author: openroof
      changes:
        - createTable:
            tableName: shedlock
            columns:
              - column: { name: name, type: varchar(255), constraints: { primaryKey: true, nullable: false } }
              - column: { name: lock_until, type: timestamp(6) }
              - column: { name: locked_by, type: varchar(255) }
              - column: { name: locked_at, type: timestamp(6) }