databaseChangeLog:
  # OR-245: [BE] Migracion DB: tabla Inspection
  - changeSet:
      id: 048-create-property-inspections-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: property_inspections
      changes:
        - createTable:
            tableName: property_inspections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: property_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: lease_id
                  type: BIGINT
              - column:
                  name: type
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_date
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: performed_by_id
                  type: BIGINT
              - column:
                  name: findings
                  type: JSONB
              - column:
                  name: overall_condition
                  type: VARCHAR(20)
              - column:
                  name: report_pdf_url
                  type: VARCHAR(500)
              - column:
                  name: tenant_signed_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: completed_at
                  type: TIMESTAMP WITHOUT TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: property_inspections
            baseColumnNames: property_id
            referencedTableName: properties
            referencedColumnNames: id
            constraintName: fk_property_inspections_property
        - addForeignKeyConstraint:
            baseTableName: property_inspections
            baseColumnNames: lease_id
            referencedTableName: leases
            referencedColumnNames: id
            constraintName: fk_property_inspections_lease
        - addForeignKeyConstraint:
            baseTableName: property_inspections
            baseColumnNames: performed_by_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_property_inspections_performed_by
        - createIndex:
            indexName: idx_property_inspections_property
            tableName: property_inspections
            columns:
              - column:
                  name: property_id
        - createIndex:
            indexName: idx_property_inspections_lease
            tableName: property_inspections
            columns:
              - column:
                  name: lease_id
