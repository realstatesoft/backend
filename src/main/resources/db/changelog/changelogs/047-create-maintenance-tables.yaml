databaseChangeLog:
  # OR-242: [BE] Migracion DB: tablas MaintenanceRequest y WorkOrder
  - changeSet:
      id: 047-create-maintenance-requests-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: maintenance_requests
      changes:
        - createTable:
            tableName: maintenance_requests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: property_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: lease_id
                  type: BIGINT
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: priority
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: images
                  type: JSONB
              - column:
                  name: assigned_vendor_id
                  type: BIGINT
              - column:
                  name: estimated_cost
                  type: NUMERIC(12, 2)
              - column:
                  name: final_cost
                  type: NUMERIC(12, 2)
              - column:
                  name: cost_billed_to
                  type: VARCHAR(20)
              - column:
                  name: permission_to_enter
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: preferred_entry_date
                  type: DATE
              - column:
                  name: has_pets
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: sla_breached
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: tenant_satisfaction_rating
                  type: INTEGER
              - column:
                  name: acknowledged_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: resolved_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: closed_at
                  type: TIMESTAMP WITHOUT TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: maintenance_requests
            baseColumnNames: property_id
            referencedTableName: properties
            referencedColumnNames: id
            constraintName: fk_maintenance_requests_property
        - addForeignKeyConstraint:
            baseTableName: maintenance_requests
            baseColumnNames: lease_id
            referencedTableName: leases
            referencedColumnNames: id
            constraintName: fk_maintenance_requests_lease
        - addForeignKeyConstraint:
            baseTableName: maintenance_requests
            baseColumnNames: tenant_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_maintenance_requests_tenant
        - addForeignKeyConstraint:
            baseTableName: maintenance_requests
            baseColumnNames: assigned_vendor_id
            referencedTableName: vendors
            referencedColumnNames: id
            constraintName: fk_maintenance_requests_vendor
        - createIndex:
            indexName: idx_maintenance_requests_property
            tableName: maintenance_requests
            columns:
              - column:
                  name: property_id
        - createIndex:
            indexName: idx_maintenance_requests_status
            tableName: maintenance_requests
            columns:
              - column:
                  name: status

  - changeSet:
      id: 047-create-work-orders-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: work_orders
      changes:
        - createTable:
            tableName: work_orders
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: maintenance_request_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: vendor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: quoted_amount
                  type: NUMERIC(12, 2)
              - column:
                  name: final_amount
                  type: NUMERIC(12, 2)
              - column:
                  name: scheduled_date
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: completed_date
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: invoice_url
                  type: VARCHAR(500)
              - column:
                  name: before_photos
                  type: JSONB
              - column:
                  name: after_photos
                  type: JSONB
              - column:
                  name: warranty_days
                  type: INTEGER
        - addForeignKeyConstraint:
            baseTableName: work_orders
            baseColumnNames: maintenance_request_id
            referencedTableName: maintenance_requests
            referencedColumnNames: id
            constraintName: fk_work_orders_maintenance_request
        - addForeignKeyConstraint:
            baseTableName: work_orders
            baseColumnNames: vendor_id
            referencedTableName: vendors
            referencedColumnNames: id
            constraintName: fk_work_orders_vendor
        - createIndex:
            indexName: idx_work_orders_maintenance_request
            tableName: work_orders
            columns:
              - column:
                  name: maintenance_request_id
        - createIndex:
            indexName: idx_work_orders_vendor
            tableName: work_orders
            columns:
              - column:
                  name: vendor_id
