databaseChangeLog:
  - changeSet:
      id: 029-create-system-config-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: system_config
      changes:
        - createTable:
            tableName: system_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: config_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: config_value
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
        - insert:
            tableName: system_config
            columns:
              - column: { name: config_key, value: RENT_DEPOSIT_MONTHS }
              - column: { name: config_value, value: "1" }
              - column: { name: created_at, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: version, valueNumeric: 0 }
        - insert:
            tableName: system_config
            columns:
              - column: { name: config_key, value: RENT_COMMISSION_PERCENT }
              - column: { name: config_value, value: "5.00" }
              - column: { name: created_at, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: version, valueNumeric: 0 }
      rollback:
        - delete:
            tableName: system_config
            where: config_key = 'RENT_DEPOSIT_MONTHS'
        - delete:
            tableName: system_config
            where: config_key = 'RENT_COMMISSION_PERCENT'
        - dropTable:
            tableName: system_config