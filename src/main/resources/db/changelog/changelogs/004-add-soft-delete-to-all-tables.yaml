            tableName: agent_clients
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        - addColumn:
            tableName: agent_profiles
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        - addColumn:
            tableName: agent_reviews
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        - addColumn:
