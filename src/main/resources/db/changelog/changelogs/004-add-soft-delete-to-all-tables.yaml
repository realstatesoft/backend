databaseChangeLog:

  # ──────────────────────────────────────────────────────────────────
  # 004 – Agregar columna deleted_at (soft delete) a todas las tablas
  #        que aún no la tienen. La tabla "properties" ya la posee.
  # ──────────────────────────────────────────────────────────────────

  - changeSet:
      id: 004-add-deleted-at
      author: openroof-team
      comment: "Agrega deleted_at TIMESTAMP a todas las tablas para soft delete global"
      changes:

        # ── admin ──────────────────────────────────────────────────
        - addColumn:
            tableName: admin_reviews
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        - addColumn:
            tableName: audit_logs
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        - addColumn:
            tableName: property_flags
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE

        # ── agent ──────────────────────────────────────────────────
