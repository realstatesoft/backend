databaseChangeLog:
  - changeSet:
      id: 035-create-highlights-table
      author: tania
      changes:
        - createTable:
            tableName: highlights
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: property_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: payment_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: highlighted_from
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: highlighted_until
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: highlights
            baseColumnNames: property_id
            constraintName: fk_highlights_property
            referencedTableName: properties
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: highlights
            baseColumnNames: payment_id
            constraintName: fk_highlights_payment
            referencedTableName: payments
            referencedColumnNames: id
        - createIndex:
            tableName: highlights
            indexName: idx_highlights_property
            columns:
              - column:
                  name: property_id
        - createIndex:
            tableName: highlights
            indexName: idx_highlights_until
            columns:
              - column:
                  name: highlighted_until

  - changeSet:
      id: 035-migrate-existing-highlights
      author: tania
      changes:
        - sql:
            sql: >
              INSERT INTO highlights (property_id, highlighted_from, highlighted_until, created_at, updated_at, version)
              SELECT id, COALESCE(highlighted_from, highlighted_until - INTERVAL '30 days'), highlighted_until, NOW(), NOW(), 0
              FROM properties
              WHERE highlighted = true
              AND highlighted_until > NOW()
              AND deleted_at IS NULL

  - changeSet:
      id: 035-drop-highlight-columns-from-properties
      author: tania
      changes:
        - dropIndex:
            tableName: properties
            indexName: idx_properties_highlighted
        - dropIndex:
            tableName: properties
            indexName: idx_properties_highlighted_active
        - dropColumn:
            tableName: properties
            columnName: highlighted
        - dropColumn:
            tableName: properties
            columnName: highlighted_from
        - dropColumn:
            tableName: properties
            columnName: highlighted_until
