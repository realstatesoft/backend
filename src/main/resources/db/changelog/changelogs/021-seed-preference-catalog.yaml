databaseChangeLog:

  # ──────────────────────────────────────────────────────────────────
  # 021 – Seed: Categorías y opciones del catálogo de preferencias
  # ──────────────────────────────────────────────────────────────────

  - changeSet:
      id: 021-seed-preference-categories
      author: openroof-team
      comment: "Inserta las categorías del catálogo de preferencias"
      changes:
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: PROPERTY_TYPE}
              - column: {name: name, value: "Tipo de propiedad"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: AVAILABILITY}
              - column: {name: name, value: "Disponibilidad"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: WATER_CONNECTION}
              - column: {name: name, value: "Conexión de agua"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: SANITARY_INSTALLATION}
              - column: {name: name, value: "Instalación sanitaria"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: EXTERIOR_FEATURE}
              - column: {name: name, value: "Características exteriores"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: INTERIOR_FEATURE}
              - column: {name: name, value: "Características interiores"}
        - insert:
            tableName: preference_categories
            columns:
              - column: {name: code, value: ZONE}
              - column: {name: name, value: "Zona"}

