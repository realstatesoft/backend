databaseChangeLog:
  # OR-261: [BE] Migracion DB: crear tabla LedgerEntry
  - changeSet:
      id: 050-create-ledger-entries-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: ledger_entries
      changes:
        - createTable:
            tableName: ledger_entries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: lease_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: property_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: related_payment_id
                  type: BIGINT
              - column:
                  name: related_work_order_id
                  type: BIGINT
              - column:
                  name: attachment_url
                  type: VARCHAR(500)
              - column:
                  name: is_tax_deductible
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_by
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: ledger_entries
            baseColumnNames: lease_id
            referencedTableName: leases
            referencedColumnNames: id
            constraintName: fk_ledger_entries_lease
        - addForeignKeyConstraint:
            baseTableName: ledger_entries
            baseColumnNames: property_id
            referencedTableName: properties
            referencedColumnNames: id
            constraintName: fk_ledger_entries_property
        - addForeignKeyConstraint:
            baseTableName: ledger_entries
            baseColumnNames: related_payment_id
            referencedTableName: lease_payments
            referencedColumnNames: id
            constraintName: fk_ledger_entries_payment
        - addForeignKeyConstraint:
            baseTableName: ledger_entries
            baseColumnNames: related_work_order_id
            referencedTableName: work_orders
            referencedColumnNames: id
            constraintName: fk_ledger_entries_work_order
        - addForeignKeyConstraint:
            baseTableName: ledger_entries
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_ledger_entries_created_by
        - createIndex:
            indexName: idx_ledger_entries_property_date
            tableName: ledger_entries
            columns:
              - column:
                  name: property_id
              - column:
                  name: date
        - createIndex:
            indexName: idx_ledger_entries_lease_type_date
            tableName: ledger_entries
            columns:
              - column:
                  name: lease_id
              - column:
                  name: type
              - column:
                  name: date
