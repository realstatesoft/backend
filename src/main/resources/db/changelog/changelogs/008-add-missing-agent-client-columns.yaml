databaseChangeLog:
  - changeSet:
      id: add-agent-client-marital-status
      author: Otto
      preConditions:
        - onFail: MARK_RAN
          not:
            columnExists:
              tableName: agent_clients
              columnName: marital_status
      changes:
        - addColumn:
            tableName: agent_clients
            columns:
              - column:
                  name: marital_status
                  type: VARCHAR(20)

  - changeSet:
      id: add-agent-client-birth-date
