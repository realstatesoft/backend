      changes:
        - insert:
            tableName: agent_clients
            columns:
              - column: {name: agent_id, valueNumeric: 200}
              - column: {name: user_id, valueNumeric: 201}
              - column: {name: priority, value: HIGH}
              - column: {name: status, value: ACTIVE}
              - column: {name: preferred_contact_method, value: EMAIL}
              - column: {name: interactions_count, valueNumeric: 15}
              - column: {name: visited_properties_count, valueNumeric: 5}
              - column: {name: offers_count, valueNumeric: 2}
              - column: {name: min_budget, valueNumeric: 200000}
              - column: {name: max_budget, valueNumeric: 400000}
              - column: {name: min_bedrooms, valueNumeric: 2}
              - column: {name: max_bedrooms, valueNumeric: 4}
              - column: {name: min_bathrooms, valueNumeric: 2}
              - column: {name: max_bathrooms, valueNumeric: 3}
              - column: {name: marital_status, value: MARRIED}
              - column: {name: birth_date, value: "1985-06-15"}
              - column: {name: occupation, value: "Ingeniero de Software"}
              - column: {name: annual_income, valueNumeric: 85000}
              - column: {name: address, value: "Av. Aviadores del Chaco 123, Asunción"}
