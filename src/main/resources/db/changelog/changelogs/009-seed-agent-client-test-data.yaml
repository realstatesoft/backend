databaseChangeLog:
  - changeSet:
      id: seed-test-agent-user-v2
      author: Otto
      preConditions:
        - onFail: MARK_RAN
          not:
            sqlCheck:
              expectedResult: 1
              sql: "SELECT COUNT(*) FROM users WHERE email = 'agent.test@openroof.com'"
      changes:
        - insert:
            tableName: users
            columns:
              - column: {name: id, valueNumeric: 200}
              - column: {name: email, value: agent.test@openroof.com}
              - column: {name: password_hash, value: "$2a$10$w3oa2wou4oTUPuafWGrR.ezomBs0tjgLZYL4Nd6ccvQ5mIiMDCYsS"}
              - column: {name: name, value: Agente de Prueba}
              - column: {name: role, value: AGENT}
              - column: {name: created_at, valueComputed: "now()"}
              - column: {name: updated_at, valueComputed: "now()"}
              - column: {name: version, valueNumeric: 1}

  - changeSet:
      id: seed-test-agent-profile-v2
      author: Otto
      preConditions:
        - onFail: MARK_RAN
          not:
            sqlCheck:
              expectedResult: 1
              sql: "SELECT COUNT(*) FROM agent_profiles WHERE user_id = 200"
      changes:
        - insert:
            tableName: agent_profiles
            columns:
              - column: {name: id, valueNumeric: 200}
              - column: {name: user_id, valueNumeric: 200}
              - column: {name: company_name, value: OpenRoof Real Estate}
              - column: {name: experience_years, valueNumeric: 5}
              - column: {name: created_at, valueComputed: "now()"}
              - column: {name: updated_at, valueComputed: "now()"}
              - column: {name: version, valueNumeric: 1}

  - changeSet:
      id: seed-test-client-user-v2
      author: Otto
      preConditions:
        - onFail: MARK_RAN
          not:
            sqlCheck:
              expectedResult: 1
              sql: "SELECT COUNT(*) FROM users WHERE email = 'juan.perez@test.com'"
      changes:
        - insert:
            tableName: users
            columns:
              - column: {name: id, valueNumeric: 201}
              - column: {name: email, value: juan.perez@test.com}
              - column: {name: password_hash, value: "$2a$10$w3oa2wou4oTUPuafWGrR.ezomBs0tjgLZYL4Nd6ccvQ5mIiMDCYsS"}
              - column: {name: name, value: Juan Pérez}
              - column: {name: role, value: USER}
              - column: {name: created_at, valueComputed: "now()"}
              - column: {name: updated_at, valueComputed: "now()"}
