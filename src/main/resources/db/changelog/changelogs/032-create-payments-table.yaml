databaseChangeLog:
  - changeSet:
      id: 032-create-payments-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: payments
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: transaction_code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: concept
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payments_user
        - createIndex:
            indexName: idx_payments_user
            tableName: payments
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_payments_type
            tableName: payments
            columns:
              - column:
                  name: type
        - createIndex:
            indexName: idx_payments_status
            tableName: payments
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_payments_created
            tableName: payments
            columns:
              - column:
                  name: created_at
