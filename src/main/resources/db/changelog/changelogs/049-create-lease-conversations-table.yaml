databaseChangeLog:
  # OR-244: [BE] Migracion DB: tablas Conversation y Message
  # New tables 'conversations' and 'conversation_messages' - separate from existing 'messages' table
  - changeSet:
      id: 049-create-conversations-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: conversations
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: subject
                  type: VARCHAR(255)
              - column:
                  name: related_lease_id
                  type: BIGINT
              - column:
                  name: last_message_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: is_archived
                  type: BOOLEAN
                  defaultValueBoolean: false
        - addForeignKeyConstraint:
            baseTableName: conversations
            baseColumnNames: related_lease_id
            referencedTableName: leases
            referencedColumnNames: id
            constraintName: fk_conversations_lease
        - createIndex:
            indexName: idx_conversations_lease
            tableName: conversations
            columns:
              - column:
                  name: related_lease_id

  - changeSet:
      id: 049-create-conversation-participants-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: conversation_participants
      changes:
        - createTable:
            tableName: conversation_participants
            columns:
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: conversation_participants
            columnNames: conversation_id, user_id
            constraintName: pk_conversation_participants
        - addForeignKeyConstraint:
            baseTableName: conversation_participants
            baseColumnNames: conversation_id
            referencedTableName: conversations
            referencedColumnNames: id
            constraintName: fk_conversation_participants_conversation
        - addForeignKeyConstraint:
            baseTableName: conversation_participants
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_conversation_participants_user

  - changeSet:
      id: 049-create-conversation-messages-table
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: conversation_messages
      changes:
        - createTable:
            tableName: conversation_messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sender_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: attachments
                  type: JSONB
              - column:
                  name: read_by
                  type: JSONB
              - column:
                  name: sent_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: conversation_messages
            baseColumnNames: conversation_id
            referencedTableName: conversations
            referencedColumnNames: id
            constraintName: fk_conversation_messages_conversation
        - addForeignKeyConstraint:
            baseTableName: conversation_messages
            baseColumnNames: sender_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_conversation_messages_sender
        - createIndex:
            indexName: idx_conversation_messages_conv_sent
            tableName: conversation_messages
            columns:
              - column:
                  name: conversation_id
              - column:
                  name: sent_at
        - createIndex:
            indexName: idx_conversation_messages_sender
            tableName: conversation_messages
            columns:
              - column:
                  name: sender_id
              - column:
                  name: sent_at
