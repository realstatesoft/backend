databaseChangeLog:
  - changeSet:
      id: 034-add-sale-commission-percent
      author: openroof
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM system_config WHERE config_key = 'SALE_COMMISSION_PERCENT'"
      changes:
        - insert:
            tableName: system_config
            columns:
              - column: { name: config_key, value: SALE_COMMISSION_PERCENT }
              - column: { name: config_value, value: "10.00" }
              - column: { name: created_at, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: version, valueNumeric: 0 }
      rollback:
        - delete:
            tableName: system_config
            where: config_key = 'SALE_COMMISSION_PERCENT'

