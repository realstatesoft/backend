spring:
  application:
    name: OpenRoof
  config:
    import: optional:file:.env[.properties]

  # ==================== DATASOURCE ====================
  # Desarrollo local por defecto con docker-compose.
  # Si querés usar otra base, sobreescribí DB_URL / DB_USERNAME / DB_PASSWORD.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openroof_db}
    username: ${DB_USERNAME:openroof}
    password: ${DB_PASSWORD:openroof123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ==================== LIQUIBASE ====================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ==================== OPENAPI / SPRINGDOC ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ==================== CORS ====================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,https://*.vercel.app}

# ==================== JWT ====================
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:REPLACE_WITH_A_SECURE_BASE64_SECRET}
      expiration: 86400000       # 24 horas en ms
      refresh-expiration: 604800000  # 7 dias en ms

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

supabase:
  url: ${SUPABASE_URL:https://YOUR-PROJECT-REF.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images}

# ==================== UPLOAD ====================
upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}

# ==================== MULTIPART ====================
spring.servlet.multipart:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

# =================== TRASHCAN ======================
trashcan:
  retention-days: 10
