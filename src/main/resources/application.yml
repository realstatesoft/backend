spring:
  application:
    name: OpenRoof

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:openroof_db}?prepareThreshold=0
    username: ${DB_USERNAME:openroof}
    password: ${DB_PASSWORD:openroof123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  # ==================== MAIL (Gmail SMTP) ====================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ==================== SERVER ====================

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,https://*.vercel.app}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:U3VwZXJTZWNyZXRLZXlCYXNlNjRFeGFtcGxlRm9yRGV2}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images}

upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}
  models:
    max-file-size: ${UPLOAD_MODELS_MAX_FILE_SIZE:20MB}
    allowed-types: ${UPLOAD_MODELS_ALLOWED_TYPES:model/gltf-binary,model/gltf+json,application/octet-stream}
  documents:
    max-file-size: ${UPLOAD_DOCUMENTS_MAX_FILE_SIZE:10MB}
    allowed-types: ${UPLOAD_DOCUMENTS_ALLOWED_TYPES:application/pdf,image/jpeg,image/png,image/webp}

# ==================== MULTIPART ====================
spring.servlet.multipart:
  max-file-size: 20MB
  max-request-size: 30MB

# ==================== RESERVATION ====================
openroof:
  reservation:
    ttl-hours: 72
    default-percent: 1.00

# ==================== SHEDLOCK ====================
shedlock:
  defaults:
    lock-at-most-for: 9m
    lock-at-least-for: 1m

trashcan:
  retention-days: 10

mail:
  from-name: OpenRoof
  base-url: ${FRONTEND_URL:http://localhost:5173}

