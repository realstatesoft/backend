spring:
  application:
    name: OpenRoof
  config:
    import: optional:file:.env[.properties]

  # ==================== DATASOURCE ====================
  # Para Supabase activar perfil: --spring.profiles.active=supabase
  # o poner las variables de entorno SUPABASE_DB_URL, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD
  datasource:
    url: jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
    username: postgres.etpxedhtursffyoeapqr
    password: OpenRoof$!*$up4Bas3#Pl4tf0rm2026*
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ==================== LIQUIBASE ====================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  # ==================== MAIL (Gmail SMTP) ====================
  # Configurar en Render Environment / .env:
  #   MAIL_USERNAME=tucorreo@gmail.com
  #   MAIL_PASSWORD=xxxx xxxx xxxx xxxx   (App Password de Google)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ==================== OPENAPI / SPRINGDOC ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ==================== CORS ====================
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,http://localhost:5173,https://*.vercel.app

# ==================== JWT ====================
application:
  security:
    jwt:
      secret-key: 9a4f2c8d3e1f0g7h6i5j4k3l2m1n0p9o8r7s6t5u4v3w2x1y0z9a8b7c6d5e4f3g
      expiration: 86400000       # 24 horas en ms
      refresh-expiration: 604800000  # 7 dias en ms

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ==================== SUPABASE STORAGE ====================
# Obtener de: Supabase Dashboard → Project Settings → API
supabase:
  url: https://etpxedhtursffyoeapqr.supabase.co
  service-role-key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0cHhlZGh0dXJzZmZ5b2VhcHFyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjA1MDQ3OSwiZXhwIjoyMDg3NjI2NDc5fQ.X_TSRUP77BhIRw3ElSjO8xgI-ToUPZ1TEj-Tvx2mgFQ
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images}

# ==================== UPLOAD ====================
upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}

# ==================== MULTIPART ====================
spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 10MB

# =================== TRASHCAN ======================
trashcan: 
  retention-days: 10

# ==================== MAIL (Gmail SMTP) ====================
# Configurar en .env:
#   MAIL_USERNAME=tucorreo@gmail.com
#   MAIL_PASSWORD=xxxx xxxx xxxx xxxx   (App Password de Google)
#   FRONTEND_URL=https://tu-frontend.vercel.app
spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true

mail:
