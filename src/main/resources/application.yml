spring:
  application:
    name: OpenRoof

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.0.9:5173,http://192.168.0.9:5174,https://*.vercel.app}

openroof:
  reservation:
    ttl-hours: ${RESERVATION_TTL_HOURS:48}
    default-percent: ${RESERVATION_DEFAULT_PERCENT:10.00}

application:
  security:
    jwt:
      # Inject JWT_SECRET from environment variables or vault.
      # Fast fail if missing: use explicit reference without default.
      # To rotate: update environment variable and restart application. Do NOT commit secrets.
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    scheduler:
      property-alerts:
        cron: ${PROPERTY_ALERTS_CRON:0 0 * * * *} # Cada hora (minuto 0)

logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# ==================== SUPABASE STORAGE ====================
# Requeridas: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Obtener de: Supabase Dashboard → Project Settings → API
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images-test}

# ==================== UPLOAD ====================
upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:15MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}
  documents:
    max-file-size: ${UPLOAD_DOCUMENTS_MAX_FILE_SIZE:10MB}
    allowed-types: ${UPLOAD_DOCUMENTS_ALLOWED_TYPES:application/pdf,image/jpeg,image/png,image/webp}
  models:
    max-file-size: ${UPLOAD_MODELS_MAX_FILE_SIZE:50MB}
    allowed-types: ${UPLOAD_MODELS_ALLOWED_TYPES:model/gltf-binary,model/gltf+json,application/octet-stream}
  floor-plans:
    max-file-size: ${UPLOAD_FLOOR_PLANS_MAX_FILE_SIZE:10MB}
    allowed-types: ${UPLOAD_FLOOR_PLANS_ALLOWED_TYPES:application/pdf,image/jpeg,image/png,image/webp}
    max-per-property: ${UPLOAD_FLOOR_PLANS_MAX_PER_PROPERTY:5}

trashcan:
  retention-days: 10

spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 60MB

shedlock:
  defaults:
    lock-at-most-for: 9m
    lock-at-least-for: 1m

mail:
  from-name: OpenRoof
  base-url: ${FRONTEND_URL:http://localhost:5173}

screening:
  provider: ${SCREENING_PROVIDER:INTERNAL}

---
# Developer profile: activate with -Dspring.profiles.active=dev
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
