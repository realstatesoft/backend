spring:
  application:
    name: OpenRoof

  config:
    import: optional:file:.env[.properties]

  datasource:

    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:openroof_db}?prepareThreshold=0
    username: ${DB_USERNAME:openroof}
    password: ${DB_PASSWORD:openroof123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: public

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,https://*.vercel.app}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:U3VwZXJTZWNyZXRLZXlCYXNlNjRFeGFtcGxlRm9yRGV2}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ==================== SUPABASE STORAGE ====================
# Requeridas: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Obtener de: Supabase Dashboard → Project Settings → API
# Requeridas: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Obtener de: Supabase Dashboard → Project Settings → API
supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:openroof-images}


# ==================== UPLOAD ====================
upload:
  max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
  allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/png,image/webp}
  # KYC / personal document upload settings (used by UserDocumentService)
  documents:
    max-file-size: ${UPLOAD_DOCUMENTS_MAX_FILE_SIZE:10MB}
    allowed-types: ${UPLOAD_DOCUMENTS_ALLOWED_TYPES:application/pdf,image/jpeg,image/png,image/webp}
  # 3D Model upload settings
  models:
    max-file-size: ${UPLOAD_MODELS_MAX_FILE_SIZE:50MB}
    allowed-types: ${UPLOAD_MODELS_ALLOWED_TYPES:model/gltf-binary,model/gltf+json}
  # Floor plan upload settings (PDF, JPG, PNG, WebP — max 5 per property)
  floor-plans:
    max-file-size: ${UPLOAD_FLOOR_PLANS_MAX_FILE_SIZE:10MB}
    allowed-types: ${UPLOAD_FLOOR_PLANS_ALLOWED_TYPES:application/pdf,image/jpeg,image/png,image/webp}
    max-per-property: ${UPLOAD_FLOOR_PLANS_MAX_PER_PROPERTY:5}

trashcan:
  retention-days: 10
# ==================== MULTIPART ====================
spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 60MB

# ==================== MAIL (Gmail SMTP) ====================
# Pasos para obtener credenciales:
# 1. Activar "Verificación en dos pasos" en tu cuenta de Google
# 2. Ir a: Cuenta Google → Seguridad → Contraseñas de aplicaciones
# 3. Crear una contraseña para "OpenRoof" (genera 16 caracteres)
# 4. Pegar en .env:
#      MAIL_USERNAME=tucorreo@gmail.com
#      MAIL_PASSWORD=xxxxxxxxxxxxxxxx   (sin espacios)
#      FRONTEND_URL=https://tu-frontend.vercel.app
spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true

mail:
  from-name: OpenRoof
  base-url: ${FRONTEND_URL:http://localhost:5173}