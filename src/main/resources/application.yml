spring:
  application:
    name: OpenRoof

  # ==================== DATASOURCE ====================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:openroof_db}
    username: ${DB_USERNAME:openroof}
    password: ${DB_PASSWORD:openroof123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ==================== LIQUIBASE ====================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ==================== OPENAPI / SPRINGDOC ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ==================== JWT ====================
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:c2VjcmV0S2V5UGFyYURlc2Fycm9sbG9Mb2NhbE9wZW5Sb29mMjAyNg==}
      expiration: 86400000       # 24 horas en ms
      refresh-expiration: 604800000  # 7 días en ms

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
