spring:
  application:
    name: OpenRoof

  # ==================== DATASOURCE ====================
  # Requeridas: DB_URL, DB_USER, DB_PASSWORD
  # Ejemplo local (docker-compose): jdbc:postgresql://localhost:5432/openroof_db
  datasource:

    url: jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0

    username: ${DB_USERNAME:openroof}
    password: ${DB_PASSWORD:openroof123}


    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ==================== LIQUIBASE ====================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# ==================== SERVER ====================
server:
  port: 8080
  servlet:
    context-path: /api

# ==================== OPENAPI / SPRINGDOC ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ==================== JWT ====================
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000       # 24 horas en ms
      refresh-expiration: 604800000  # 7 dias en ms

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ==================== SUPABASE STORAGE ====================
# Requeridas: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Obtener de: Supabase Dashboard → Project Settings → API
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: openroof-images

# ==================== UPLOAD ====================
upload:
  max-file-size: 5MB
  allowed-types: image/jpeg,image/png,image/webp

# ==================== MULTIPART ====================
spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 10MB
