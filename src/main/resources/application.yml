spring:
  application:
    name: OpenRoof
  config:
    import: optional:file:.env[.properties]

  # ==================== DATASOURCE ====================
  # Requeridas: DB_URL, DB_USER, DB_PASSWORD
  # Ejemplo local (docker-compose): jdbc:postgresql://localhost:5432/openroof_db
  datasource:
    url: jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
    username: postgres.etpxedhtursffyoeapqr
    password: OpenRoof$!*$up4Bas3#Pl4tf0rm2026*

    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ==================== LIQUIBASE ====================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ==================== MAIL ====================
  # Valores temporales para que el backend arranque sin depender de variables externas.
  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@openroof.com
    password: change-me
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ==================== JACKSON ====================
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ==================== OPENAPI / SPRINGDOC ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ==================== JWT ====================
application:
  security:
    jwt:
      secret-key: c2VjcmV0S2V5UGFyYURlc2Fycm9sbG9Mb2NhbE9wZW5Sb29mMjAyNg==
      expiration: 86400000       # 24 horas en ms
      refresh-expiration: 604800000  # 7 dias en ms

mail:
  from-name: OpenRoof
  base-url: http://localhost:5173

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    com.openroof: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ==================== SUPABASE STORAGE ====================
