# Test datasource — H2 in-memory, PostgreSQL-compatible mode
# NON_KEYWORDS does NOT include ORDER (adding ORDER breaks ORDER BY)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE,USER,TYPE,STATUS,KEY;LOCK_MODE=0
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable env-file import so the production .env doesn't override test settings
spring.config.import=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Liquibase must be disabled — DDL is handled by create-drop above
spring.liquibase.enabled=false

# JWT configuration for tests (dummy 256-bit Base64 key)
application.security.jwt.secret-key=aGVsbG8td29ybGQtdGVzdC1zZWNyZXQta2V5LTI1Ni1iaXQtbG9uZy1lbm91Z2gtZm9yLXRlc3Rpbmc=
application.security.jwt.expiration=3600000
application.security.jwt.refresh-expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000

# Supabase dummy
supabase.url=http://localhost:54321
supabase.service-role-key=dummy-key
supabase.storage.bucket=test-bucket

# Upload dummy
upload.allowed-types=image/jpeg,image/png,image/webp
upload.max-file-size=5MB
