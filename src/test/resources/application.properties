# CORS configuration for tests
cors.allowed-origins=http://localhost:3000

# Supabase dummy configuration for tests
supabase.url=http://localhost:54321
supabase.service-role-key=dummy-key
supabase.storage.bucket=test-bucket

# Upload dummy configuration for tests
upload.allowed-types=image/jpeg,image/png,image/webp
upload.max-file-size=5MB
